name: Deploy RSS feeds to Pages

on:
  schedule:
    - cron: '0 3 * * *'          # каждый день в 3:00 UTC (можно изменить)
  workflow_dispatch:             # можно запускать вручную

permissions:
  contents: write               # важно! для коммитов
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y locales
          sudo locale-gen ru_RU.UTF-8
          sudo update-locale LANG=ru_RU.UTF-8
          pip install -r requirements.txt

      - name: Run RSS generator
        run: python main.py

      - name: Commit updated feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet docs/; then
            echo "No changes to commit"
          else
            git add docs/
            git commit -m "Update RSS feeds (automated)"
            git push
            echo "Changes committed and pushed"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
